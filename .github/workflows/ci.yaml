name: 'CI'
on:
  push:
    branches:
    - 'master'
  pull_request:
    branches:
    - 'master'
jobs:
  check_yaml_consistency:
    name: 'Check YAML consistency'
    runs-on: 'ubuntu-latest'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Execute script'
      run: 'rm ''.github/workflows/ci.yaml'' && ''.github/workflows/ci.main.kts'''
    - id: 'step-2'
      name: 'Consistency check'
      run: 'git diff --exit-code ''.github/workflows/ci.yaml'''
  core:
    runs-on: 'ubuntu-latest'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Set up JDK 17'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '17'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'Build core'
      run: './gradlew :core:build'
  android:
    runs-on: 'ubuntu-latest'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Set up JDK 17'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '17'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'Set up Android SDK'
      uses: 'android-actions/setup-android@v3'
    - id: 'step-3'
      name: 'Build android'
      run: './gradlew :android:build'
  cli:
    runs-on: 'ubuntu-latest'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Set up JDK 17'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '17'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'Build CLI'
      run: './gradlew :cli:build'
    - id: 'step-3'
      name: 'Upload coverage to Codecov'
      uses: 'codecov/codecov-action@v4'
  web-e2e:
    runs-on: 'ubuntu-latest'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Set up JDK 17'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '17'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'E2E smoke test'
      run: './gradlew :web-e2e:test'
  web:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v4'
    - id: 'step-1'
      name: 'Set up JDK 17'
      uses: 'actions/setup-java@v4'
      with:
        java-version: '17'
        distribution: 'temurin'
    - id: 'step-2'
      name: 'Build web'
      run: './gradlew :web:build'
    - id: 'step-3'
      name: 'Deploy to GitHub Pages'
      env:
        GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      run: |-
        set -e
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git clone --single-branch --branch gh-pages \
          https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git gh-pages
        cd gh-pages
        git checkout --orphan gh-pages-new
        git rm -rf .
        cd ..
        cp -av web/build/distributions gh-pages
        cd gh-pages
        mv distributions/* .
        git add -A
        git commit -m "Deploy to GitHub Pages: $GITHUB_SHA" --allow-empty
        git branch -D gh-pages 2>/dev/null || true
        git branch -m gh-pages-new gh-pages
        git push --force origin gh-pages
      if: '${{ github.ref == ''refs/heads/master'' && github.event_name == ''push'' }}'
